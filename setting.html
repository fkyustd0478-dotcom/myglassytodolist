<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系統設定 — 琉璃</title>

    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="shared_theme.css">
    <link rel="stylesheet" href="effects.css">
    <link rel="stylesheet" href="shift_style.css">

    <script src="effects.js" defer></script>
    <script src="storage.js" defer></script>
    <script src="nav.js" defer></script>
    <script src="setting.js?v=1.0" defer></script>
</head>
<body>
    <div id="app" v-cloak :class="[isDarkTheme ? 'theme-dark-mode' : 'theme-light-mode']">
        <!-- Background Layers -->
        <div class="bg-layer" :class="themeClasses"></div>
        <div v-show="settings.useCustomBg" class="custom-bg-layer" :style="customBgStyle"></div>

        <!-- Header & Navigation -->
        <header class="flex justify-between items-center p-6 shrink-0 relative z-[1000]">
            <!-- Nav Capsule -->
            <div class="relative nav-capsule" @click.stop>
                <button @click="toggleNavDropdown"
                        class="glass px-5 py-2 rounded-full flex items-center gap-3 transition-all active:scale-95 group"
                        :style="glassStyle">
                    <span class="text-lg font-black tracking-tight group-hover:text-blue-500 transition-colors" v-text="currentPageTitle"></span>
                    <i data-lucide="chevron-down" class="w-4 h-4 opacity-40 group-hover:rotate-180 transition-transform"></i>
                </button>

                <transition name="fade">
                    <div v-show="navDropdownOpen" class="dropdown-menu glass w-48 mt-2 overflow-hidden" :style="glassStyle">
                        <a href="javascript:void(0)" onclick="window.location.href='index.html'" class="dropdown-item flex items-center gap-3">
                            <i data-lucide="check-square" class="w-4 h-4"></i>
                            <span>琉璃待辦</span>
                        </a>
                        <a href="javascript:void(0)" onclick="window.location.href='shift.html'" class="dropdown-item flex items-center gap-3">
                            <i data-lucide="calendar" class="w-4 h-4"></i>
                            <span>琉璃輪班</span>
                        </a>
                        <a href="javascript:void(0)" onclick="window.location.href='setting.html'" class="dropdown-item flex items-center gap-3 active">
                            <i data-lucide="settings" class="w-4 h-4"></i>
                            <span>系統設定</span>
                        </a>
                    </div>
                </transition>
            </div>
        </header>

        <!-- Page Content -->
        <div class="relative z-10 flex flex-col px-6 pb-6 gap-4" style="min-height: calc(100vh - 88px);">

            <!-- Tab Bar -->
            <div class="flex gap-2">
                <button @click="settingsTab = 'theme'"
                        class="flex-1 py-2.5 rounded-full text-sm font-black transition-all"
                        :class="settingsTab === 'theme' ? 'bg-blue-500 text-white' : 'glass opacity-60'"
                        :style="settingsTab !== 'theme' ? glassStyle : {}">
                    主題設定
                </button>
                <button @click="settingsTab = 'user'"
                        class="flex-1 py-2.5 rounded-full text-sm font-black transition-all"
                        :class="settingsTab === 'user' ? 'bg-blue-500 text-white' : 'glass opacity-60'"
                        :style="settingsTab !== 'user' ? glassStyle : {}">
                    使用者頁面
                </button>
            </div>

            <!-- Theme Tab -->
            <div v-show="settingsTab === 'theme'" class="space-y-4">

                <!-- Theme Buttons -->
                <div class="glass rounded-3xl p-5 space-y-4" :style="glassStyle">
                    <div class="flex items-center gap-2 opacity-40">
                        <i data-lucide="palette" class="w-4 h-4"></i>
                        <h3 class="text-[10px] font-black uppercase tracking-widest">{{ t.theme }}</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button @click="selectTheme('light')"
                            class="h-12 rounded-2xl border-2 transition-all flex flex-col items-center justify-center gap-1"
                            :class="(!settings.useCustomBg && settings.theme === 'light') ? 'border-blue-500 bg-blue-500/10' : 'border-white/5 bg-white/5'">
                            <i data-lucide="sun" class="w-4 h-4"></i>
                            <span class="text-[10px] font-bold">{{ t.light }}</span>
                        </button>
                        <button @click="selectTheme('dark')"
                            class="h-12 rounded-2xl border-2 transition-all flex flex-col items-center justify-center gap-1"
                            :class="(!settings.useCustomBg && settings.theme === 'dark') ? 'border-blue-500 bg-blue-500/10' : 'border-white/5 bg-white/5'">
                            <i data-lucide="moon" class="w-4 h-4"></i>
                            <span class="text-[10px] font-bold">{{ t.dark }}</span>
                        </button>
                    </div>

                    <!-- Other Themes Dropdown -->
                    <div class="custom-dropdown">
                        <div class="dropdown-trigger glass rounded-xl p-3 text-xs font-bold" :style="glassStyle" @click="themeDropdownOpen = !themeDropdownOpen">
                            <span>{{ t[settings.theme] || settings.theme }}</span>
                            <i data-lucide="chevron-down" class="w-3 h-3 opacity-40" :class="{ 'rotate-180': themeDropdownOpen }"></i>
                        </div>
                        <transition name="fade">
                            <div v-show="themeDropdownOpen" class="dropdown-menu glass" :style="glassStyle">
                                <div v-for="th in otherThemes" :key="th.id"
                                    class="dropdown-item py-2 text-xs" :class="{ active: settings.theme === th.id }"
                                    @click="selectTheme(th.id)">
                                    {{ t[th.id] }}
                                </div>
                            </div>
                        </transition>
                    </div>
                </div>

                <!-- Effects -->
                <div class="glass rounded-3xl p-5 space-y-3" :style="glassStyle">
                    <div class="flex items-center gap-2 opacity-40">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                        <h3 class="text-[10px] font-black uppercase tracking-widest">視覺特效</h3>
                    </div>
                    <div class="grid grid-cols-4 gap-2">
                        <button v-for="eff in ['none', 'cherry', 'rain', 'snow']" :key="eff"
                                @click="settings.effect = eff"
                                class="h-10 rounded-xl border-2 transition-all flex items-center justify-center text-[10px] font-bold"
                                :class="settings.effect === eff ? 'border-blue-500 bg-blue-500/10' : 'border-white/5 bg-white/5'">
                            {{ eff === 'none' ? '無' : (eff === 'cherry' ? '櫻花' : (eff === 'rain' ? '下雨' : '下雪')) }}
                        </button>
                    </div>
                </div>

                <!-- Custom Background -->
                <div class="glass rounded-3xl p-5 space-y-3" :style="glassStyle">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-2 opacity-40">
                            <i data-lucide="image" class="w-4 h-4"></i>
                            <h3 class="text-[10px] font-black uppercase tracking-widest">{{ t.custom }}</h3>
                        </div>
                        <div class="flex gap-3">
                            <button v-show="settings.customBg" @click="clearCustomBg" class="text-[10px] font-black text-red-500 uppercase tracking-widest">{{ t.removeImg }}</button>
                            <button v-show="settings.customBg" @click="toggleCustomBg" class="text-[10px] font-black text-blue-500 uppercase tracking-widest">
                                {{ settings.useCustomBg ? t.disable : t.enable }}
                            </button>
                        </div>
                    </div>
                    <button @click="triggerUpload" class="w-full h-16 rounded-xl border-2 border-dashed flex flex-col items-center justify-center gap-1 transition-all overflow-hidden relative"
                        :class="settings.useCustomBg ? 'border-blue-500 bg-blue-500/10' : 'border-white/10 bg-white/5'">
                        <img v-show="settings.customBg" :src="settings.customBg" class="absolute inset-0 w-full h-full object-cover opacity-40">
                        <i data-lucide="upload" class="w-4 h-4 relative z-10"></i>
                        <span class="text-[10px] font-bold relative z-10">{{ settings.customBg ? 'Change Photo' : t.upload }}</span>
                    </button>
                    <input type="file" ref="fileInput" class="hidden" accept="image/*" @change="handleUpload">

                    <!-- Opacity Slider -->
                    <div v-show="settings.useCustomBg" class="space-y-2">
                        <div class="flex justify-between items-center px-1">
                            <h3 class="text-[10px] font-black opacity-40 uppercase tracking-widest">{{ t.uiOpacity }}</h3>
                            <span class="text-[10px] font-black text-blue-500">{{ Math.round(settings.customBgOpacity * 100) }}%</span>
                        </div>
                        <input type="range" min="0" max="1" step="0.01" v-model="settings.customBgOpacity" class="w-full px-1">
                    </div>
                </div>

                <!-- Language & Notifications -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass rounded-3xl p-5 flex flex-col items-center gap-3" :style="glassStyle">
                        <div class="flex items-center gap-2 opacity-40">
                            <i data-lucide="languages" class="w-3 h-3"></i>
                            <h3 class="text-[9px] font-black uppercase tracking-widest">{{ t.lang }}</h3>
                        </div>
                        <button @click="toggleLang" class="w-full py-2 rounded-xl glass text-[10px] font-bold" :style="glassStyle">
                            {{ settings.lang === 'en' ? 'EN' : 'TW' }}
                        </button>
                    </div>
                    <div class="glass rounded-3xl p-5 flex flex-col items-center gap-3" :style="glassStyle">
                        <div class="flex items-center gap-2 opacity-40">
                            <i data-lucide="bell" class="w-3 h-3"></i>
                            <h3 class="text-[9px] font-black uppercase tracking-widest">{{ t.notifications }}</h3>
                        </div>
                        <button @click="toggleNotifications" class="w-12 h-6 rounded-full relative transition-all duration-300"
                            :class="settings.notificationsEnabled ? 'bg-blue-500' : 'bg-white/10'">
                            <div class="absolute top-1 w-4 h-4 rounded-full bg-white shadow-sm transition-all duration-300"
                                :style="{ left: settings.notificationsEnabled ? '26px' : '4px' }"></div>
                        </button>
                    </div>
                </div>

                <!-- Clear Cache -->
                <div class="glass rounded-3xl p-5 space-y-3" :style="glassStyle">
                    <div class="flex items-center gap-2 opacity-40 px-1">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i>
                        <h3 class="text-[9px] font-black uppercase tracking-widest">System</h3>
                    </div>
                    <button @click="clearCacheAndUpdate" class="w-full py-3 rounded-xl bg-red-500/20 text-red-500 text-[10px] font-black uppercase tracking-widest border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">
                        {{ t.clearCache }}
                    </button>
                </div>
            </div>

            <!-- User Tab -->
            <div v-show="settingsTab === 'user'" class="space-y-4">
                <div class="glass rounded-3xl p-8 flex flex-col items-center gap-4" :style="glassStyle">
                    <div class="w-20 h-20 rounded-full bg-white/10 flex items-center justify-center">
                        <i data-lucide="user" class="w-10 h-10 opacity-40"></i>
                    </div>
                    <p class="text-sm font-bold opacity-40">使用者頁面即將推出</p>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
