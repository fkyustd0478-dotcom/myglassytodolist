<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <script>!function(){try{var d=JSON.parse(localStorage.getItem('todo_settings')||'{}'),t=d.theme||'light';if(t==='system')t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.className='theme-'+t;var dk=['dark','forest','night','torii','starrysky','ferriswheel'];document.documentElement.style.background=dk.indexOf(t)>=0?'#0d1117':'#f0f4ff';}catch(e){}}();</script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stats</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <link rel="stylesheet" href="shared_theme.css">
    <link rel="stylesheet" href="effects.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="lapis_shared_style.css">

    <script src="effects.js" defer></script>
    <script src="storage.js" defer></script>
    <script src="nav.js" defer></script>
    <script src="lapis_global_nav.js" defer></script>
    <script src="stats.js" defer></script>

    <style>
        .stat-card {
            border-radius: 22px;
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .stat-value  { font-size: 38px; font-weight: 900; line-height: 1; }
        .stat-label  { font-size: 11px; font-weight: 800; opacity: 0.40; text-transform: uppercase; letter-spacing: 0.08em; }
        .stat-sub    { font-size: 12px; font-weight: 700; opacity: 0.50; margin-top: 2px; }
        .stat-unit   { font-size: 16px; font-weight: 700; opacity: 0.50; margin-left: 4px; }
        .stats-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .stats-wide  { grid-column: 1 / -1; }
        .section-hdr { font-size: 11px; font-weight: 800; opacity: 0.35; text-transform: uppercase; letter-spacing: 0.10em; margin: 20px 0 10px; }
        .coming-card {
            border-radius: 22px; padding: 32px 24px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="app" v-cloak
     :style="themeStyle"
     :class="[isDarkTheme ? 'theme-dark-mode' : 'theme-light-mode']"
     style="display:flex;flex-direction:column;min-height:100dvh;overflow:hidden;position:relative;">

    <div class="bg-layer" :class="themeClasses" :key="navSettings.theme"></div>
    <div v-show="navSettings.useCustomBg" class="custom-bg-layer" :style="customBgStyle"></div>

    <main style="flex:1;overflow-y:auto;padding:0 20px 88px;-webkit-overflow-scrolling:touch;">

        <!-- Page header -->
        <div style="padding-top:52px;margin-bottom:28px;">
            <h1 style="font-size:26px;font-weight:900;margin:0;">{{ t.title }}</h1>
        </div>

        <!-- Workout section -->
        <p class="section-hdr">{{ t.sectionWorkout }}</p>
        <div class="stats-grid">

            <div class="stat-card glass" :style="glassStyle">
                <p class="stat-label">{{ t.totalSessions }}</p>
                <p class="stat-value">{{ workoutCount }}</p>
            </div>

            <div class="stat-card glass" :style="glassStyle">
                <p class="stat-label">{{ t.thisWeek }}</p>
                <p class="stat-value">{{ thisWeek }}</p>
            </div>

            <div v-if="latestWeight" class="stat-card glass stats-wide" :style="glassStyle">
                <p class="stat-label">{{ t.latestWeight }}</p>
                <p class="stat-value">
                    {{ latestWeight.weight }}<span class="stat-unit">{{ latestWeight.unit }}</span>
                </p>
                <p class="stat-sub">{{ latestWeight.date }}</p>
            </div>

            <div v-if="exerciseCount > 0" class="stat-card glass" :style="glassStyle">
                <p class="stat-label">{{ t.exercises }}</p>
                <p class="stat-value">{{ exerciseCount }}</p>
            </div>

        </div>

        <!-- Coming soon -->
        <p class="section-hdr">{{ t.sectionCharts }}</p>
        <div class="coming-card glass" :style="glassStyle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                 style="opacity:0.25;margin:0 auto 14px;">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6"  y1="20" x2="6"  y2="14"/>
            </svg>
            <p style="font-size:14px;font-weight:800;opacity:0.35;">{{ t.comingSoon }}</p>
        </div>

    </main>

</div>
</body>
</html>
