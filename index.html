<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <!-- Anti-flash: apply theme class before CSS renders -->
    <script>!function(){try{var d=JSON.parse(localStorage.getItem('todo_settings')||'{}'),t=d.theme||'light';if(t==='system')t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.className='theme-'+t;var dk=['dark','forest','night','torii','starrysky','ferriswheel'];document.documentElement.style.background=dk.indexOf(t)>=0?'#0d1117':'#f0f4ff';}catch(e){}}();</script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glassy Home</title>

    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <link rel="stylesheet" href="./css/shared_theme.css">
    <link rel="stylesheet" href="./css/effects.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/lapis_shared_style.css">

    <script src="./js/effects.js" defer></script>
    <script src="./js/storage.js" defer></script>
    <script src="./js/nav.js" defer></script>
    <script src="./js/lapis_global_nav.js" defer></script>
    <script src="./modules/index.js" defer></script>

    <style>
        .portal-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            border-radius: 22px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.18s ease, opacity 0.18s ease;
        }
        .portal-card:active { transform: scale(0.97); opacity: 0.85; }
        .portal-icon {
            width: 52px; height: 52px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .portal-info { flex: 1; min-width: 0; }
        .portal-name { font-size: 16px; font-weight: 900; margin: 0 0 3px; line-height: 1.2; }
        .portal-desc { font-size: 12px; opacity: 0.45; margin: 0; font-weight: 600; }
        .portal-chevron { opacity: 0.25; flex-shrink: 0; }
        .settings-link {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px 20px; border-radius: 16px;
            text-decoration: none; color: inherit;
            font-size: 13px; font-weight: 700; opacity: 0.45;
            transition: opacity 0.15s;
        }
        .settings-link:active { opacity: 0.8; }
    </style>
</head>
<body>

<div id="app" v-cloak
     :style="themeStyle"
     :class="[isDarkTheme ? 'theme-dark-mode' : 'theme-light-mode']"
     style="display:flex;flex-direction:column;min-height:100dvh;overflow:hidden;position:relative;">

    <!-- Background Layers -->
    <div class="bg-layer" :class="themeClasses" :key="navSettings.theme"></div>
    <div v-show="navSettings.useCustomBg" class="custom-bg-layer" :style="customBgStyle"></div>

    <!-- Scrollable Content -->
    <main style="flex:1;overflow-y:auto;padding:0 20px 88px;-webkit-overflow-scrolling:touch;">

        <!-- Welcome Header -->
        <div style="padding-top:52px;margin-bottom:36px;">
            <p style="font-size:13px;font-weight:700;opacity:0.40;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;">
                {{ todayLabel }}
            </p>
            <h1 style="font-size:30px;font-weight:900;line-height:1.15;margin:0;">
                {{ greeting }}
            </h1>
        </div>

        <!-- Portal Cards -->
        <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:28px;">

            <!-- Todo -->
            <a href="todo.html" class="portal-card glass" :style="glassStyle">
                <div class="portal-icon" style="background:rgba(59,130,246,0.16);color:#3b82f6;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
                        <line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                </div>
                <div class="portal-info">
                    <p class="portal-name">{{ t.nameTodo }}</p>
                    <p class="portal-desc">{{ t.descTodo }}</p>
                </div>
                <svg class="portal-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </a>

            <!-- Workout -->
            <a href="workout.html" class="portal-card glass" :style="glassStyle">
                <div class="portal-icon" style="background:rgba(249,115,22,0.16);color:#f97316;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 4v16"/><path d="M18 4v16"/>
                        <path d="M6 8h12"/><path d="M6 16h12"/>
                        <path d="M3 6.5A1.5 1.5 0 0 1 4.5 5h.5"/><path d="M3 17.5A1.5 1.5 0 0 0 4.5 19h.5"/>
                        <path d="M21 6.5A1.5 1.5 0 0 0 19.5 5h-.5"/><path d="M21 17.5A1.5 1.5 0 0 1 19.5 19h-.5"/>
                    </svg>
                </div>
                <div class="portal-info">
                    <p class="portal-name">{{ t.nameWorkout }}</p>
                    <p class="portal-desc">{{ t.descWorkout }}</p>
                </div>
                <svg class="portal-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </a>

            <!-- Shift -->
            <a href="shift.html" class="portal-card glass" :style="glassStyle">
                <div class="portal-icon" style="background:rgba(168,85,247,0.16);color:#a855f7;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </div>
                <div class="portal-info">
                    <p class="portal-name">{{ t.nameShift }}</p>
                    <p class="portal-desc">{{ t.descShift }}</p>
                </div>
                <svg class="portal-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
            </a>

        </div>

        <!-- Settings link -->
        <a href="setting.html" class="settings-link glass" :style="glassStyle">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
                <path d="M19.07 4.93 4.93 19.07"/>
            </svg>
            {{ t.settings }}
        </a>

    </main>

</div>
</body>
</html>
