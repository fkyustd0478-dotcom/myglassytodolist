<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- Anti-flash: apply theme class before CSS renders -->
    <script>!function(){try{var d=JSON.parse(localStorage.getItem('todo_settings')||'{}'),t=d.theme||'light';if(t==='system')t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.className='theme-'+t;var dk=['dark','forest','night','torii','starrysky','ferriswheel'];document.documentElement.style.background=dk.indexOf(t)>=0?'#0d1117':'#f0f4ff';}catch(e){}}();</script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glassy Home</title>

    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="./css/shared_theme.css">
    <link rel="stylesheet" href="./css/effects.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/lapis_shared_style.css">
    <link rel="stylesheet" href="./css/lapis_scroll.css">

    <script src="./js/effects.js" defer></script>
    <script src="./js/storage.js" defer></script>
    <script src="./js/nav.js" defer></script>
    <script src="./js/lapis_core_ui.js" defer></script>
    <script src="./modules/index.js" defer></script>

    <style>
        /* ── Anti-flicker ─────────────────────────────────────────────────── */
        [v-cloak] { display: none !important; }
        html  { background: #0d0d0d; }
        body  { opacity: 0; transition: opacity 0.4s ease-in-out; }
        body.lapis-ready { opacity: 1; }

        /* ── Typography ───────────────────────────────────────────────────── */
        .hub-subtitle {
            font-size: 13px; font-weight: 700; opacity: 0.40;
            letter-spacing: 0.06em; text-transform: uppercase;
            margin-bottom: 6px;
        }
        .hub-title { font-size: 30px; font-weight: 900; line-height: 1.15; margin: 0; }

        /* ── Dashboard section label ──────────────────────────────────────── */
        .dash-section-label {
            font-size: 11px; font-weight: 800; opacity: 0.38;
            text-transform: uppercase; letter-spacing: 0.10em;
            margin: 0 0 10px 2px;
        }

        /* ── Dashboard cards ──────────────────────────────────────────────── */
        .dash-card {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px; border-radius: 18px; margin-bottom: 8px;
        }
        .dash-empty {
            padding: 16px; border-radius: 18px; text-align: center;
            font-size: 12px; font-weight: 700; opacity: 0.35; margin-bottom: 8px;
        }
        .dash-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .dash-info { flex: 1; min-width: 0; }
        .dash-name {
            font-size: 13px; font-weight: 800; margin: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .dash-sub  { font-size: 11px; font-weight: 600; opacity: 0.55; margin: 2px 0 0; }
        .dash-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.50; }

        /* ── Quick Add toggle ─────────────────────────────────────────────── */
        .quick-toggle {
            display: flex; border-radius: 14px; overflow: hidden;
            border: 2px solid rgba(59, 130, 246, 0.3);
        }
        .quick-toggle button {
            flex: 1; padding: 11px 8px; font-size: 13px; font-weight: 800;
            cursor: pointer; opacity: 0.45; background: none; border: none;
            color: inherit; font-family: inherit; transition: all 0.2s;
        }
        .quick-toggle button.active { background: var(--primary); color: #fff; opacity: 1; }

        /* ── Glass input (base dark style; light overrides in shared_theme.css) */
        .glass-input {
            width: 100%; background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.18); border-radius: 14px;
            padding: 14px 16px; color: inherit; font-family: inherit;
            font-size: 15px; font-weight: 600; outline: none;
            box-sizing: border-box; transition: border-color 0.2s;
        }
        .glass-input:focus { border-color: rgba(255, 255, 255, 0.50); }
        .glass-input::placeholder { opacity: 0.45; }

        /* ── Toast ────────────────────────────────────────────────────────── */
        .index-toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(34, 197, 94, 0.92); color: #fff;
            padding: 10px 26px; border-radius: 999px;
            font-size: 13px; font-weight: 800; z-index: 10000;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
            white-space: nowrap; pointer-events: none;
        }
    </style>
</head>
<body>
<div id="lapis-bg-system">
    <div id="bg-layer-a" class="lapis-bg-layer active"></div>
    <div id="bg-layer-b" class="lapis-bg-layer"></div>
</div>

<div id="app" v-cloak
     :style="themeStyle"
     :class="[isDarkTheme ? 'theme-dark-mode' : 'theme-light-mode']"
     style="display:flex;flex-direction:column;height:100dvh;overflow:hidden;position:relative;">

    <!-- Toast -->
    <transition name="fade">
        <div v-show="toastShow" class="index-toast">{{ toastMsg }}</div>
    </transition>

    <!-- Scrollable Content -->
    <main style="flex:1;overflow-y:auto;padding:0 20px var(--nav-height);-webkit-overflow-scrolling:touch;">

        <!-- Welcome Header -->
        <div style="padding-top:52px;margin-bottom:28px;">
            <p class="hub-subtitle">{{ todayLabel }}</p>
            <h1 class="hub-title">{{ greeting }}</h1>
        </div>

        <!-- ── Today ──────────────────────────────────────────────────────── -->
        <p class="dash-section-label">{{ t.today }} · {{ todayShortLabel }}</p>

        <div v-if="!dashboard.today.tasks.length && !dashboard.today.shifts.length"
             class="glass dash-empty" :style="glassStyle">
            {{ t.noEvents }}
        </div>
        <template v-else>
            <div v-for="s in dashboard.today.shifts" :key="'ts'+s.id"
                 class="glass dash-card" :style="glassStyle">
                <span class="dash-dot" :style="{background: s.color}"></span>
                <div class="dash-info">
                    <p class="dash-name">{{ s.name }}</p>
                    <p class="dash-sub">{{ s.startTime }} – {{ s.endTime }}</p>
                </div>
            </div>
            <div v-for="task in dashboard.today.tasks" :key="'tt'+task.id"
                 class="glass dash-card" :style="glassStyle">
                <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                <div class="dash-info"><p class="dash-name">{{ task.text }}</p></div>
            </div>
        </template>

        <!-- ── Tomorrow ───────────────────────────────────────────────────── -->
        <p class="dash-section-label" style="margin-top:20px;">{{ t.tomorrow }} · {{ tomorrowShortLabel }}</p>

        <div v-if="!dashboard.tomorrow.tasks.length && !dashboard.tomorrow.shifts.length"
             class="glass dash-empty" :style="glassStyle">
            {{ t.noEvents }}
        </div>
        <template v-else>
            <div v-for="s in dashboard.tomorrow.shifts" :key="'ms'+s.id"
                 class="glass dash-card" :style="glassStyle">
                <span class="dash-dot" :style="{background: s.color}"></span>
                <div class="dash-info">
                    <p class="dash-name">{{ s.name }}</p>
                    <p class="dash-sub">{{ s.startTime }} – {{ s.endTime }}</p>
                </div>
            </div>
            <div v-for="task in dashboard.tomorrow.tasks" :key="'mt'+task.id"
                 class="glass dash-card" :style="glassStyle">
                <svg class="dash-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                <div class="dash-info"><p class="dash-name">{{ task.text }}</p></div>
            </div>
        </template>

    </main>

    <!-- ── Quick Add Modal (LV2) ──────────────────────────────────────────── -->
    <div id="quick-add-modal" class="lapis-modal-backdrop"
         style="z-index:var(--z-modal-lv2-backdrop);display:none;align-items:flex-end;justify-content:center">
        <div class="lapis-modal-shell" style="z-index:var(--z-modal-lv2-content)">
            <div class="lapis-modal-header">
                <span class="lapis-modal-title">{{ t.quickAdd }}</span>
                <button class="lapis-modal-close" @click="closeQuickAdd()">✕</button>
            </div>
            <div class="lapis-modal-body">
                <div class="quick-toggle">
                    <button :class="{active: quickMode==='task'}"   @click="quickMode='task'">{{ t.quickTask }}</button>
                    <button :class="{active: quickMode==='weight'}" @click="quickMode='weight'">{{ t.logWeight }}</button>
                </div>
                <input v-if="quickMode==='task'"
                       v-model="quickText" type="text"
                       :placeholder="t.taskNamePlaceholder"
                       class="glass-input" style="margin-top:14px;"
                       @keyup.enter="saveQuick()" />
                <input v-if="quickMode==='weight'"
                       v-model.number="quickWeight" type="number" step="0.1" min="0"
                       :placeholder="t.weightPlaceholder"
                       class="glass-input" style="margin-top:14px;"
                       @keyup.enter="saveQuick()" />
            </div>
            <div class="lapis-modal-footer">
                <button class="lapis-btn-secondary" @click="closeQuickAdd()">{{ t.cancel }}</button>
                <button class="lapis-btn-primary"   @click="saveQuick()">{{ t.save }}</button>
            </div>
        </div>
    </div>

    <!-- ── Bottom Navigation ──────────────────────────────────────────────── -->
    <nav class="bottom-nav glass" :style="glassStyle">
        <a href="index.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>{{ navSettings.lang === 'zh' ? '首頁' : 'Home' }}</span>
        </a>
        <button @click="openQuickAdd()" class="nav-item nav-add-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>{{ navSettings.lang === 'zh' ? '新增' : 'Add' }}</span>
        </button>
        <a href="stats.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>{{ navSettings.lang === 'zh' ? '統計' : 'Stats' }}</span>
        </a>
    </nav>
</div>
</body>
</html>
