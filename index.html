<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <!-- Anti-flash: apply theme class before CSS renders -->
    <script>!function(){try{var d=JSON.parse(localStorage.getItem('todo_settings')||'{}'),t=d.theme||'light';if(t==='system')t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.className='theme-'+t;var dk=['dark','forest','night','torii','starrysky','ferriswheel'];document.documentElement.style.background=dk.indexOf(t)>=0?'#0d1117':'#f0f4ff';}catch(e){}}();</script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glassy Home</title>

    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="./css/shared_theme.css">
    <link rel="stylesheet" href="./css/effects.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/lapis_shared_style.css">

    <script src="./js/effects.js" defer></script>
    <script src="./js/storage.js" defer></script>
    <script src="./js/nav.js" defer></script>
    <script src="./js/lapis_core_ui.js" defer></script>
    <script src="./modules/index.js" defer></script>

    <style>
        .hub-subtitle {
            font-size: 13px; font-weight: 700; opacity: 0.40;
            letter-spacing: 0.06em; text-transform: uppercase;
            margin-bottom: 6px;
        }
        .hub-title {
            font-size: 30px; font-weight: 900; line-height: 1.15; margin: 0;
        }
    </style>
</head>
<body>

<div id="app" v-cloak
     :style="themeStyle"
     :class="[isDarkTheme ? 'theme-dark-mode' : 'theme-light-mode']"
     style="display:flex;flex-direction:column;min-height:100dvh;overflow:hidden;position:relative;">

    <!-- Background Layers -->
    <div class="bg-layer" :class="themeClasses" :key="navSettings.theme"></div>
    <div v-show="navSettings.useCustomBg" class="custom-bg-layer" :style="customBgStyle"></div>

    <!-- Scrollable Content -->
    <main style="flex:1;overflow-y:auto;padding:0 20px 100px;-webkit-overflow-scrolling:touch;">

        <!-- Welcome Header -->
        <div style="padding-top:52px;margin-bottom:36px;">
            <p class="hub-subtitle">{{ todayLabel }}</p>
            <h1 class="hub-title">{{ greeting }}</h1>
        </div>

    </main>

    <!-- ── Bottom Navigation ───────────────────────────────────────────────── -->
    <nav class="bottom-nav glass index-bottom-nav" :style="glassStyle">
        <a href="index.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>{{ navSettings.lang === 'zh' ? '首頁' : 'Home' }}</span>
        </a>
        <a href="todo.html" class="nav-item nav-add-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span>{{ navSettings.lang === 'zh' ? '新增' : 'Add' }}</span>
        </a>
        <a href="stats.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>{{ navSettings.lang === 'zh' ? '統計' : 'Stats' }}</span>
        </a>
    </nav>

</div>
</body>
</html>
